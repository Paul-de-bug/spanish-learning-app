<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#f7f3ea">
    <title>Spanish Pills</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <button id="menuOverlay" class="menu-overlay hidden" type="button" aria-label="Close menu"></button>
    <aside id="mobileMenu" class="mobile-menu" aria-hidden="true">
      <div class="menu-header">
        <div>
          <p class="eyebrow">Menu</p>
          <h2>Lessons</h2>
        </div>
        <button id="closeMenuButton" class="icon-button" type="button" aria-label="Close menu">×</button>
      </div>

      <section class="menu-section">
        <label class="field">
          <span>Lesson</span>
          <select id="lessonSelect"></select>
        </label>
        <p id="lessonDescription" class="menu-description"></p>
        <div class="menu-action-row">
          <button id="shuffleButton" class="text-button" type="button">Shuffle lesson</button>
          <button id="resetButton" class="text-button" type="button">Reset stats</button>
        </div>
      </section>

      <section class="menu-section">
        <div class="saved-header">
          <div>
            <h2>Recent accuracy</h2>
            <p>Rolling saved attempts</p>
          </div>
        </div>
        <div id="historyBars" class="history-bars"></div>
      </section>

      <section class="menu-section">
        <div class="saved-header">
          <div>
            <h2>Saved words</h2>
            <p><span id="savedCount">0</span> saved on this device</p>
          </div>
          <button id="clearSavedButton" class="text-button" type="button">Clear</button>
        </div>

        <div class="save-form">
          <label class="field">
            <span>Spanish word or chunk</span>
            <input id="saveFrontInput" type="text" autocomplete="off" placeholder="e.g. me cuesta">
          </label>
          <label class="field">
            <span>Meaning or note</span>
            <input id="saveBackInput" type="text" autocomplete="off" placeholder="I find it hard">
          </label>
          <button id="saveManualButton" class="secondary-button" type="button">Save word</button>
        </div>

        <div id="savedPreview" class="saved-preview"></div>

        <div class="export-actions">
          <button id="exportCsvButton" class="secondary-button" type="button">Export Anki TSV</button>
          <button id="exportJsonButton" class="secondary-button" type="button">Export JSON</button>
        </div>
      </section>
    </aside>

    <main class="app">
      <header class="topbar">
        <div>
          <p class="eyebrow">Spanish Pills</p>
          <h1>Build the answer</h1>
        </div>
        <button id="openMenuButton" class="icon-button menu-button" type="button" aria-label="Open menu" title="Open menu">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"></path>
          </svg>
        </button>
      </header>

      <section class="stats" aria-label="Session stats">
        <div id="progressBox" class="progress-stat">
          <strong id="progressText">0 / 0</strong>
          <span>progress</span>
        </div>
        <div>
          <strong id="correctText">0</strong>
          <span>correct</span>
        </div>
        <div id="accuracyBox" class="accuracy-stat">
          <strong id="accuracyText">100%</strong>
          <span>accuracy</span>
        </div>
      </section>

      <section class="card" aria-live="polite">
        <div class="meta-row">
          <span id="questionCounter" hidden></span>
        </div>

        <p id="promptText" class="prompt">Loading...</p>

        <div class="answer-block">
          <div class="answer-header">
            <button id="undoButton" class="text-button" type="button">Undo</button>
          </div>
          <div id="answerLine" class="answer-line" aria-label="Selected chunks"></div>
        </div>

        <div id="chunkBank" class="chunk-bank" aria-label="Available chunks"></div>

        <div class="actions">
          <button id="skipButton" class="secondary-button" type="button">Skip</button>
          <button id="submitButton" class="primary-button" type="button">Submit</button>
        </div>

        <div id="feedback" class="feedback hidden">
          <p id="feedbackTitle"></p>
          <p><strong>Correct:</strong> <span id="correctAnswer"></span></p>
          <p><strong>English:</strong> <span id="englishAnswer"></span></p>
          <p><strong>Your answer:</strong> <span id="attemptAnswer"></span></p>
          <div class="save-chunks">
            <span>Save useful chunks</span>
            <div id="saveChunkList" class="save-chip-list"></div>
          </div>
        </div>
      </section>

    </main>

    <script src="./app.js" type="module"></script>
  </body>
</html>
