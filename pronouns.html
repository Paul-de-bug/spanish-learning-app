<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#f7f3ea">
    <title>Práctica de pronombres · Píldoras de español</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <p class="eyebrow">Píldoras de español</p>
          <h1>Pronombres</h1>
        </div>
        <button id="newRoundButton" class="icon-button" type="button" aria-label="Empezar una ronda nueva" title="Empezar una ronda nueva">↻</button>
      </header>

      <nav class="app-tabs" aria-label="Modos de práctica">
        <a href="./index.html">Lecciones</a>
        <a class="active" href="./pronouns.html" aria-current="page">Pronombres</a>
      </nav>

      <section class="pronoun-score" aria-label="Puntuación de la práctica de pronombres">
        <span><strong id="pronounProgress">1 / 10</strong> pregunta</span>
        <span><strong id="pronounAccuracy">0%</strong> precisión</span>
      </section>

      <section class="card pronoun-card" aria-live="polite">
        <div class="pronoun-heading">
          <p class="prompt-label">Infinitivo</p>
          <p id="pronounVerb" class="pronoun-verb">dar</p>
        </div>

        <div class="pronoun-scene" aria-label="La persona o el grupo de la izquierda hace la acción hacia la derecha">
          <div id="subjectGroup" class="person-group"></div>
          <div class="action-arrow" aria-hidden="true">
            <span>→</span>
          </div>
          <div id="objectGroup" class="person-group object-group"></div>
        </div>

        <div class="answer-block">
          <div class="answer-header">
            <span>Tu respuesta</span>
            <button id="pronounUndoButton" class="text-button" type="button">Deshacer</button>
          </div>
          <div id="pronounAnswerLine" class="answer-line pronoun-answer-line" aria-label="Respuesta elegida"></div>
        </div>

        <div id="pronounChunkBank" class="chunk-bank pronoun-bank" aria-label="Opciones disponibles"></div>

        <div class="actions">
          <button id="pronounSkipButton" class="secondary-button" type="button">Saltar</button>
          <button id="pronounSubmitButton" class="primary-button" type="button">Comprobar</button>
        </div>

        <div id="pronounFeedback" class="feedback hidden">
          <p id="pronounFeedbackTitle"></p>
          <p><strong>Respuesta:</strong> <span id="pronounCorrectAnswer"></span></p>
        </div>
      </section>

    </main>

    <script src="./pronouns.js" type="module"></script>
  </body>
</html>
